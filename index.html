    <script type="text/javascript">
        // --- 1. 既存の通知・マップ機能 (変更なし) ---
        window.askNotificationPermission = function() {
            if (!("Notification" in window)) { alert("このブラウザは通知に対応していません。"); return; }
            Notification.requestPermission().then(p => p==="granted" ? alert("通知が許可されました！") : alert("通知が拒否されました。"));
        };
        window.sendEarthquakeNotification = function(title, message, scaleCode){
    if(!("Notification" in window) || Notification.permission !== "granted") return;

    const colorMap = {
        "1":"#9e9e9e","2":"#2196f3","3":"#4caf50","4":"#fdd835",
        "5-":"#ffeb3b","5+":"#ff9800","6-":"#f44336","6+":"#d32f2f","7":"#b71c1c"
    };

    const canvas = document.createElement("canvas");
    canvas.width = 128; canvas.height = 128;
    const ctx = canvas.getContext("2d");
    const color = colorMap[String(scaleCode)] || "#333";
    ctx.fillStyle = color;
    ctx.fillRect(0,0,128,128);
    ctx.fillStyle = (scaleCode === "4" || scaleCode === "5-") ? "#333" : "#fff";
    ctx.font = "bold 48px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    // 表示テキストはそのままの文字列（例: "5-"）を使う
    ctx.fillText(String(scaleCode), 64, 64);

    canvas.toBlob(blob=>{
        const url = URL.createObjectURL(blob);
        // service worker が使える場合は reg.showNotification を使うと堅牢
        if(navigator.serviceWorker && navigator.serviceWorker.ready){
            navigator.serviceWorker.ready.then(reg=> reg.showNotification(title, { body: message, icon: url, badge: url, tag: "eq-noti" }));
        } else {
            // フォールバック: Notification コンストラクタ
            new Notification(title, { body: message, icon: url, badge: url, tag: "eq-noti" });
        }
        setTimeout(()=> URL.revokeObjectURL(url), 10000);
    });
};


        let myMap=null;
        window.updateMap = function(lat, lng, points){
            setTimeout(()=>{
                const mapEl = document.getElementById("map");
                if(!mapEl) return;
                if(myMap){ myMap.off(); myMap.remove(); myMap = null; }
                try{
                    myMap = L.map("map").setView([lat, lng], 6);
                    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { attribution:"© OpenStreetMap" }).addTo(myMap);
                    L.marker([lat,lng]).addTo(myMap).bindPopup("震源地").openPopup();
                    myMap.invalidateSize();
                } catch(e){ console.error("Map Error:", e); }
            }, 150);
        };


        function showTsunamiMap(){
            const container=document.getElementById("tsunami_map_container");
            const tsunamiData=(typeof debug_tsunami_data!=="undefined"&&debug_tsunami_data.length>0)?debug_tsunami_data:(window.real_tsunami_data||[]);
            if(!tsunamiData||tsunamiData.length===0){container.style.display="none";return;}
            container.style.display="block";
            if(window.tsunamiMap){window.tsunamiMap.off();window.tsunamiMap.remove();}
            window.tsunamiMap=L.map("tsunami_map").setView([36.0,138.0],5);
            L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap"}).addTo(window.tsunamiMap);
            tsunamiData.forEach(d=>{
                if(!d.lat||!d.lng||!d.height)return;
                L.circle([d.lat,d.lng],{radius:5000,color:getColor(d.height),fillColor:getColor(d.height),fillOpacity:0.5})
                .addTo(window.tsunamiMap).bindPopup(`${d.name} 津波予測: ${d.height}m`);
            });
        }

    <script type="text/javascript">
    // --- 2. 通知設定・条件判定・多言語 (統合版) ---
    const notifyBtn = document.getElementById("notify_btn");
    const langSelect = document.getElementById("lang_select");
    const myRegionSelect = document.getElementById("myregion_notify_select");
    const otherSelect = document.getElementById("other_notify_select");

    const NOTIFY_TEXT = {
        ja: "通知を有効にする", en: "Enable Notifications", ko: "알림 활성화", zh: "启用通知", "zh-tw": "啟用通知"
    };
    const NOTIFY_ENABLED_TEXT = {
        ja: "通知は有効になっています。", en: "Notifications are enabled.", ko: "알림이 활성화되었습니다.", zh: "通知已启用。", "zh-tw": "通知已啟用。"
    };

    function isNotifyActivated() {
        return localStorage.getItem("notifyActivated") === "true";
    }

    function updateNotifyButton() {
        const lang = langSelect.value;
        if (Notification.permission !== "granted" && isNotifyActivated()) {
            localStorage.setItem("notifyActivated", "false");
        }
        notifyBtn.textContent = isNotifyActivated() ? (NOTIFY_ENABLED_TEXT[lang] || NOTIFY_ENABLED_TEXT["en"]) : (NOTIFY_TEXT[lang] || NOTIFY_TEXT["en"]);
    }

    // 震度比較用の関数
    window.shouldNotify = function(regionType, currentScale) {
        if (!isNotifyActivated()) return false;
        const order = ["1","2","3","4","5-","5+","6-","6+","7"];
        const currentIdx = order.indexOf(String(currentScale));
        if (currentIdx === -1) return false;

        const storageKey = (regionType === "myregion") ? "myRegionMinScale" : "otherMinScale";
        const minScale = localStorage.getItem(storageKey) || "5-";
        return currentIdx >= order.indexOf(minScale);
    };

    // 保存処理
    function saveThresholds() {
        localStorage.setItem("myRegionMinScale", myRegionSelect.value);
        localStorage.setItem("otherMinScale", otherSelect.value);
    }

    langSelect.addEventListener    ("change", () => {
        updateNotifyButton();
        updateNotifyUILabels();
    });

    myRegionSelect.addEventListener("change", saveThresholds);
    otherSelect.addEventListener("change", saveThresholds);

    notifyBtn.addEventListener("click", () => {
        if (!("Notification" in window)) { alert("このブラウザは通知に対応していません。"); return; }
        Notification.requestPermission().then(permission => {
            if (permission === "granted") {
                localStorage.setItem("notifyActivated", "true");
                updateNotifyButton();
                new Notification(NOTIFY_ENABLED_TEXT[langSelect.value] || NOTIFY_ENABLED_TEXT["en"], {
                    body: "通知設定が完了しました。",
                    icon: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/65/Red_circle.svg/120px-Red_circle.svg.png"
                });
            } else {
                localStorage.setItem("notifyActivated", "false");
                updateNotifyButton();
                alert("通知を有効にするにはブラウザの設定で許可してください。");
            }
        });
    });

    // 初期読み込み
    function init() {
        myRegionSelect.value = localStorage.getItem("myRegionMinScale") || "5-";
        otherSelect.value = localStorage.getItem("otherMinScale") || "5-";
        updateNotifyButton();
    }
    init();

// 設定モーダルやボタンを削除（あれば）
document.querySelectorAll('#settings_modal, #open_settings_btn, #close_settings_btn, #open_settings_btn').forEach(el => {
  if (el && el.parentNode) el.parentNode.removeChild(el);
});

// 非表示にされていた「通知する最小震度」周りを再表示（親ブロックを上位まで探して表示）
['myregion_notify_select','other_notify_select'].forEach(id=>{
  const sel = document.getElementById(id);
  if(!sel) return;
  let parent = sel.parentElement;
  if(parent) parent.style.display = '';
  let grand = parent && parent.parentElement;
  if(grand) grand.style.display = '';
});

const NOTIFY_UI_TEXT = {
    ja: {
        title: "通知する最小震度",
        myRegion: "マイ地域",

    },
